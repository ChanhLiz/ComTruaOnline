<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đặt hàng thành công</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(
    135deg,
    #16a34a,
    #22c55e
    );
}

.success-card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:500px;
    box-shadow:
    0 10px 30px rgba(0,0,0,.2);
}

.success-icon{
    font-size:80px;
    margin-bottom:15px;
}

.success-card h2{
    color:#198754;
    font-weight:700;
}

</style>
</head>

<body>

<div class="success-card">

<div class="success-icon">
✅
</div>

<h2>
Đặt hàng thành công
</h2>

<p id="order-info"></p>

<a
href="/"
class="btn btn-success mt-3">
Về trang chủ
</a>

</div>

<script>

const orderId =
localStorage.getItem(
"last_order_id"
);

document.getElementById(
"order-info"
).innerText =
"Đơn hàng #" + orderId +
" đã được ghi nhận.";

</script>

</body>
</html>
