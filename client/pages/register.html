<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

  <div class="auth-card">

    <h3 class="auth-title">Đăng ký tài khoản</h3>

<input
  id="full_name"
  class="form-control"
  placeholder="Họ tên"
>

<div id="full_name-error" class="form-error"></div>

<input
  id="email"
  class="form-control"
  placeholder="Email"
>

<div id="email-error" class="form-error"></div>

<input
  type="tel"
  id="phone"
  class="form-control"
  maxlength="10"
  oninput="this.value=this.value.replace(/[^0-9]/g,'')"
  placeholder="Số điện thoại"
>

<div id="phone-error" class="form-error"></div>

<div class="password-wrapper">
  <input
    id="password"
    type="password"
    class="form-control pe-5"
    placeholder="Mật khẩu"
  >

  <button
    type="button"
    class="toggle-password"
    onclick="togglePassword('password', this)"
  >
    👁️
  </button>
</div>

<div id="password-error" class="form-error"></div>

<button class="btn btn-primary w-100 mt-3" onclick="handleRegister()">
  Đăng ký
</button>

<div class="auth-footer">
  Đã có tài khoản?
  <a href="/pages/login.html">Đăng nhập</a>
</div>

  </div>

  <script src="../js/register.js"></script>

</body>
</html>
