<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Chi tiết sản phẩm</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  >

  <style>

.star{
  cursor:pointer;
  transition:0.2s;
}

.star:hover{
  transform:scale(1.2);
}

.review-card{
  border:1px solid #eee;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.review-user{
  display:flex;
  align-items:center;
  gap:12px;
}

.review-avatar{
  width:48px;
  height:48px;
  border-radius:50%;

  background:#ee4d2d;
  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:bold;
  font-size:20px;
}

.review-name{
  font-weight:600;
}

.review-date{
  font-size:13px;
  color:#888;
}

.review-comment{
  margin-top:10px;
}

.review-locked{
  background:#f8f9fa;
  border:1px solid #dee2e6;
  border-radius:12px;
  padding:20px;
}

#review-stats{
  background:#fff8f0;
  border:1px solid #ffe0b3;
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
}

.navbar .nav-link{
    font-size: 14.8px;
    font-weight: 500;
}

</style>

</head>

  <!-- NAVBAR (GIỐNG TRANG CHỦ) -->

      </a>

        class="navbar-toggler"
        type="button"

      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">

        <ul class="navbar-nav ms-auto align-items-lg-center">

          <li class="nav-item">
  <a class="nav-link" href="/">Trang chủ</a>
</li>

<li class="nav-item">
  <a class="nav-link" href="/#menu-section">Thực đơn</a>
</li>

<li class="nav-item">

</li>

<li class="nav-item">

    Chính sách
  </a>
</li>

<li class="nav-item"><a class="nav-link"href="/pages/my-orders.html">Đơn hàng của tôi</a></li>

          </li>

          <li class="nav-item ms-lg-3">
            <a href="/pages/cart.html" class="btn btn-success">
              <i class="bi bi-cart"></i>
              Giỏ hàng (<span id="cart-count">0</span>)
            </a>
          </li>

        </ul>

      </div>

    </div>

  <!-- CONTENT -->

      <h5 class="mb-3">Thêm vào giỏ thành công!</h5>

      <p>Sản phẩm đã được thêm vào giỏ hàng của bạn.</p>

        Tiếp tục mua hàng
      </button>

</div>
