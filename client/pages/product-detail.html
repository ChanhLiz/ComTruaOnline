<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Chi tiết sản phẩm</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  >

  <style>

.star{
  cursor:pointer;
  transition:0.2s;
}

.star:hover{
  transform:scale(1.2);
}

.review-card{
  border:1px solid #eee;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.review-user{
  display:flex;
  align-items:center;
  gap:12px;
}

.review-avatar{
  width:48px;
  height:48px;
  border-radius:50%;

  background:#ee4d2d;
  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:bold;
  font-size:20px;
}

.review-name{
  font-weight:600;
}

.review-date{
  font-size:13px;
  color:#888;
}

.review-comment{
  margin-top:10px;
}

.review-locked{
  background:#f8f9fa;
  border:1px solid #dee2e6;
  border-radius:12px;
  padding:20px;
}

#review-stats{
  background:#fff8f0;
  border:1px solid #ffe0b3;
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
}

.navbar .nav-link{
    font-size: 14.8px;
    font-weight: 500;
}

</style>

</head>

<body>

  <!-- NAVBAR (GIỐNG TRANG CHỦ) -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">

      <a class="navbar-brand fw-bold text-success" href="/">
        🍱 Cơm Trưa Online
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">

        <ul class="navbar-nav ms-auto align-items-lg-center">

          <li class="nav-item">
  <a class="nav-link" href="/">Trang chủ</a>
</li>

<li class="nav-item">
  <a class="nav-link" href="/#menu-section">Thực đơn</a>
</li>

<li class="nav-item">
  <a class="nav-link" href="/#contact-section">Liên hệ</a>
</li>

<li class="nav-item">
  <a class="nav-link" href="/pages/policy.html">
    Chính sách
  </a>
</li>

<li class="nav-item"><a class="nav-link" href="/pages/profile.html">Hồ sơ</a></li>
<li class="nav-item"><a class="nav-link"href="/pages/my-orders.html">Đơn hàng của tôi</a></li>

          <li class="nav-item ms-lg-3">
            <span id="auth-area"></span>
          </li>

          <li class="nav-item ms-lg-3">
            <a href="/pages/cart.html" class="btn btn-success">
              <i class="bi bi-cart"></i>
              Giỏ hàng (<span id="cart-count">0</span>)
            </a>
          </li>

        </ul>

      </div>

    </div>
  </nav>

  <!-- CONTENT -->
  <div class="container py-5">

      <a href="/" class="btn btn-outline-secondary mb-3">
      ← Quay lại trang chủ
     </a>
    <div id="product-detail"></div>

  </div>

<!-- Modal chọn tùy chọn món -->
<div class="modal fade" id="optionModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Tùy chọn món ăn
                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <h6 id="optionProductName"
                    class="fw-bold mb-3"></h6>


                <!-- ================= CƠM ================= -->

                <div id="riceOptionGroup" class="mb-4">

                    <label class="form-label fw-bold">
                        Cơm
                    </label>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="extraRice"
                            id="riceNormal"
                            checked>

                        <label class="form-check-label">
                            Bình thường
                        </label>

                    </div>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="extraRice"
                            id="riceExtra">

                        <label class="form-check-label">
                            Cơm thêm (+5.000đ)
                        </label>

                    </div>

                </div>


                <!-- ================= BÚN ================= -->

                <div id="noodleOptionGroup"
                     class="mb-4 d-none">

                    <label class="form-label fw-bold">
                        Bún
                    </label>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="extraNoodle"
                            id="noodleNormal"
                            checked>

                        <label class="form-check-label">
                            Bình thường
                        </label>

                    </div>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="extraNoodle"
                            id="noodleExtra">

                        <label class="form-check-label">
                            Thêm bún (+5.000đ)
                        </label>

                    </div>

                </div>


                <!-- ================= MÌ ================= -->

                <div id="noodleTypeGroup"
                     class="mb-4 d-none">

                    <label class="form-label fw-bold">
                        Mì
                    </label>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="extraMi"
                            id="miNormal"
                            checked>

                        <label class="form-check-label">
                            Bình thường
                        </label>

                    </div>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="extraMi"
                            id="miExtra">

                        <label class="form-check-label">
                            Thêm mì (+5.000đ)
                        </label>

                    </div>

                </div>


                <!-- ================= NƯỚC ================= -->

                <div id="drinkOptionGroup"
                     class="mb-4 d-none">

                    <label class="form-label fw-bold">
                        Đồ uống
                    </label>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="extraIce"
                            id="iceNormal"
                            checked>

                        <label class="form-check-label">
                            Đá bình thường
                        </label>

                    </div>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="extraIce"
                            id="iceExtra">

                        <label class="form-check-label">
                            Thêm đá
                        </label>

                    </div>

                </div>


                <!-- Độ cay -->

                <div id="spicyGroup" class="mb-4">

                    <label class="form-label fw-bold">
                        Độ cay
                    </label>

                    <select
                        id="spicyLevel"
                        class="form-select">

                        <option>Không cay</option>
                        <option selected>Ít cay</option>
                        <option>Cay</option>

                    </select>

                </div>


                


                <!-- Ghi chú -->

                <div>

                    <label class="form-label fw-bold">
                        📝 Ghi chú
                    </label>

                    <textarea
                        id="foodNote"
                        class="form-control"
                        rows="3"
                        placeholder="Nhập ghi chú..."></textarea>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Hủy

                </button>

                <button
                    class="btn btn-success"
                    id="confirmOptionBtn">

                    Thêm vào giỏ

                </button>

            </div>

        </div>

    </div>

</div>


<!-- Modal thông báo thêm thành công -->
<div class="modal fade" id="cartModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content text-center p-4">

      <h5 class="mb-3">
        Thêm vào giỏ thành công!
      </h5>

      <p>
        Sản phẩm đã được thêm vào giỏ hàng của bạn.
      </p>

      <button
        class="btn btn-success"
        data-bs-dismiss="modal">
        Tiếp tục mua hàng
      </button>

    </div>

  </div>
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/cart-common.js"></script>
<script src="../js/main.js"></script>
<script src="../js/product-detail.js"></script>
<script src="../js/auth.js"></script>

</body>

</html>
